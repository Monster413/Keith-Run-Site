<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keith's Run Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F25C1E;--ol:#FFF0E8;--cream:#FDFAF4;
  --ink:#1A1410;--ink2:#4A3F38;--ink3:#9A8E87;
  --surface:#fff;--border:rgba(26,20,16,.09);--border2:rgba(26,20,16,.16);
  --green:#1A9457;--greenbg:#E8F7F0;
  --red:#C93333;--redbg:#FBEAEA;
  --r:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{background:var(--ink);padding:0 20px}
.hdr-in{max-width:960px;margin:0 auto;padding:28px 0 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,11vw,84px);line-height:1;color:#fff;letter-spacing:.02em}
.logo span{color:var(--orange)}
.hstats{display:grid;grid-template-columns:repeat(4,auto);gap:20px 28px;padding-bottom:4px}
.hstat-v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;line-height:1}
.hstat-v em{color:var(--orange);font-style:normal;font-size:16px}
.hstat-l{font-size:10px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

/* MOBILE TILES */
.tiles{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.tile-v{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--ink)}
.tile-v em{color:var(--orange);font-style:normal;font-size:18px}
.tile-l{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;margin-top:4px}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:28px 20px 80px}

/* SECTION ROW */
.srow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--ink)}
.ctrls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.pbtn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;transition:all .12s;touch-action:manipulation}
.pbtn:hover{background:var(--ol);border-color:var(--orange);color:var(--orange)}
.pbtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
.ugrp{display:flex;border:1px solid var(--border2);border-radius:100px;overflow:hidden}
.ubtn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border:none;background:transparent;color:var(--ink2);cursor:pointer;transition:all .12s;touch-action:manipulation}
.ubtn.on{background:var(--ink);color:#fff}
.vdiv{width:1px;height:22px;background:var(--border2);margin:0 4px}

/* CHART */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.chart-wrap{position:relative;height:240px}
.chart-hint{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:20px}

/* SELECTED RACE PANEL */
.race-panel{display:none;background:var(--ink);color:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:24px;animation:slideDown .2s ease}
.race-panel.show{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.rp-name{font-weight:600;font-size:14px;margin-bottom:4px}
.rp-date{font-size:12px;color:rgba(255,255,255,.45)}
.rp-metrics{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap;align-items:center}
.rp-m{text-align:center}
.rp-mv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.rp-ml{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.rp-delta{font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap}
.rp-delta.faster{background:var(--greenbg);color:var(--green)}
.rp-delta.slower{background:var(--redbg);color:var(--red)}
.rp-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.rp-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.rp-nav{display:flex;gap:6px}
.rp-nb{background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .1s}
.rp-nb:hover:not(:disabled){background:rgba(255,255,255,.2)}
.rp-nb:disabled{opacity:.25;cursor:default}

/* DESKTOP TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);background:var(--cream);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .1s}
thead th:hover{color:var(--ink)}
thead th.r{text-align:right}
thead th .sa{margin-left:4px;opacity:.3;font-size:9px}
thead th.sorted .sa{opacity:1;color:var(--orange)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--ol)}
tbody tr.active td{background:var(--ol)}
tbody tr.active td:first-child{border-left:3px solid var(--orange);padding-left:11px}
td.r{text-align:right}
td.mono{font-variant-numeric:tabular-nums}
td.muted{color:var(--ink3);font-size:12px}
.ename{font-weight:500}
.dbadge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.d10{background:#F3F0FF;color:#5240B0}
.dhalf{background:#EBF2FF;color:#1B59AC}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;padding:3px 8px;border-radius:6px;white-space:nowrap}
.delta.faster{background:var(--greenbg);color:var(--green)}
.delta.slower{background:var(--redbg);color:var(--red)}
.delta.same{color:var(--ink3);font-weight:400}
.delta.none{color:var(--ink3)}

/* MOBILE CARDS */
.log-cards{display:none;flex-direction:column;gap:10px}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.lcard.active{border-left-color:var(--orange);background:var(--ol)}
.lcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.lcard-name{font-size:13px;font-weight:600;line-height:1.3}
.lcard-date{font-size:11px;color:var(--ink3);margin-top:2px}
.lcard-body{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.lm-l{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.lm-v{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
tbody tr,.lcard{animation:fadeUp .3s ease both}

/* RESPONSIVE */
@media(max-width:640px){
  .hdr-in{flex-direction:column;align-items:flex-start;gap:0;padding-bottom:20px}
  .hstats{display:none}
  .tiles{display:grid}
  .tbl-wrap{display:none}
  .log-cards{display:flex}
  .chart-card{padding:14px}
  .chart-wrap{height:200px}
  .main{padding:20px 16px 80px}
}
@media(min-width:641px){.tiles{display:none}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <h1 class="logo">Keith's<span>Run</span>Tracker</h1>
    <div class="hstats" id="hstats"></div>
  </div>
</header>

<main class="main">
  <div class="tiles" id="tiles"></div>

  <div class="srow">
    <span class="stitle">Pace Over Time</span>
    <div class="ctrls">
      <button class="pbtn on" data-f="pace">Pace</button>
      <button class="pbtn" data-f="duration">Duration</button>
      <div class="vdiv"></div>
      <div class="ugrp">
        <button class="ubtn on" data-u="km">km</button>
        <button class="ubtn" data-u="mi">mi</button>
      </div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <p class="chart-hint">Click a point to inspect a race</p>

  <div class="race-panel" id="rpanel"></div>

  <div class="srow">
    <span class="stitle">Race Log</span>
    <span style="font-size:12px;color:var(--ink3)" id="logsub"></span>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead id="thead"><tr>
        <th data-col="name">Event <span class="sa">↕</span></th>
        <th data-col="date">Date <span class="sa">↕</span></th>
        <th data-col="km">Dist <span class="sa">↕</span></th>
        <th data-col="secs" class="r">Time <span class="sa">↕</span></th>
        <th data-col="paceKm" class="r">Pace /km <span class="sa">↕</span></th>
        <th data-col="paceMi" class="r">Pace /mi <span class="sa">↕</span></th>
        <th class="r">vs Prev Same Dist</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="log-cards" id="lcards"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
const RAW=[
  {n:"Turkey Trot 2024",                  d:"11/28/2024",km:10.0,t:"1:58:24"},
  {n:"LA Dodgers Foundation Run",         d:"09/27/2025",km:10.0,t:"1:44:35"},
  {n:"Turkey Trot 2025",                  d:"11/27/2025",km:10.0,t:"1:41:25"},
  {n:"Santa Monica-Venice Xmas Run 2025", d:"12/13/2025",km:10.0,t:"1:34:14"},
  {n:"LA Chinatown Firecracker 2026",     d:"03/01/2026",km:10.0,t:"1:35:48"},
];
const KMI=0.621371;
const ps=t=>{const p=t.split(':').map(Number);return p[0]*3600+p[1]*60+(p[2]||0)};
const fp=s=>{const m=Math.floor(s/60),sc=Math.round(s%60);return`${m}:${String(sc).padStart(2,'0')}`};
const ft=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.round(s%60);return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`};

const runs=RAW.map(r=>{
  const secs=ps(r.t),mi=r.km*KMI;
  return{name:r.n,date:r.d,dateObj:new Date(r.d),km:r.km,mi,secs,paceKm:secs/r.km,paceMi:secs/mi};
}).sort((a,b)=>a.dateObj-b.dateObj);

const prevMap=new Map(),last={};
runs.forEach(r=>{prevMap.set(r,last[r.km]||null);last[r.km]=r});

function getDelta(r){
  const prev=prevMap.get(r);
  if(!prev)return null;
  const d=r.paceKm-prev.paceKm,abs=Math.abs(d);
  const dm=Math.floor(abs/60),ds=Math.round(abs%60);
  const str=dm>0?`${dm}m ${String(ds).padStart(2,'0')}s`:`${ds}s`;
  if(d<-2)return{cls:'faster',label:`▲ ${str}/km faster`};
  if(d>2) return{cls:'slower',label:`▼ ${str}/km slower`};
  return{cls:'same',label:'± same'};
}

// header stats
const totKm=runs.reduce((s,r)=>s+r.km,0);
const totSecs=runs.reduce((s,r)=>s+r.secs,0);
const totH=Math.floor(totSecs/3600),totM=Math.floor((totSecs%3600)/60);
const avgPKm=totSecs/totKm;
document.getElementById('hstats').innerHTML=`
  <div><div class="hstat-v">${runs.length}</div><div class="hstat-l">Races</div></div>
  <div><div class="hstat-v">${totKm.toFixed(1)}<em>km</em></div><div class="hstat-l">Total dist</div></div>
  <div><div class="hstat-v">${totH}<em>h ${totM}m</em></div><div class="hstat-l">Time on feet</div></div>
  <div><div class="hstat-v">${fp(avgPKm)}<em>/km</em></div><div class="hstat-l">Avg pace</div></div>
`;
document.getElementById('tiles').innerHTML=`
  <div class="tile"><div class="tile-v">${runs.length}</div><div class="tile-l">Races</div></div>
  <div class="tile"><div class="tile-v">${totKm.toFixed(1)}<em>km</em></div><div class="tile-l">Total dist</div></div>
  <div class="tile"><div class="tile-v">${totH}<em>h ${totM}m</em></div><div class="tile-l">Time on feet</div></div>
  <div class="tile"><div class="tile-v">${fp(avgPKm)}<em>/km</em></div><div class="tile-l">Avg pace</div></div>
`;

// ── CHART ──
let chartInst=null, curF='pace', curU='km', selIdx=null;

// Plugin: draws a horizontal dashed line + pill label at the selected point's Y value
const refLinePlugin={
  id:'refLine',
  afterDraw(chart){
    if(selIdx===null)return;
    const ds=chart.data.datasets[0];
    if(!ds||selIdx>=ds.data.length)return;
    const val=ds.data[selIdx];
    const yScale=chart.scales.y;
    const xScale=chart.scales.x;
    const y=yScale.getPixelForValue(val);
    const c=chart.ctx;
    c.save();
    // dashed line
    c.beginPath();
    c.setLineDash([5,4]);
    c.strokeStyle='rgba(242,92,30,0.45)';
    c.lineWidth=1.5;
    c.moveTo(xScale.left,y);
    c.lineTo(xScale.right,y);
    c.stroke();
    c.setLineDash([]);
    // pill label — use stored tipFn
    const label=chart._tipFn?chart._tipFn(val):'';
    if(!label)return;
    c.font='500 11px DM Sans,sans-serif';
    const tw=c.measureText(label).width;
    const pw=tw+14, ph=20, px=xScale.right-pw-2, py=y-ph/2, pr=4;
    // draw rounded rect manually (no roundRect needed)
    c.fillStyle='#F25C1E';
    c.beginPath();
    c.moveTo(px+pr,py);
    c.lineTo(px+pw-pr,py);
    c.arcTo(px+pw,py,px+pw,py+pr,pr);
    c.lineTo(px+pw,py+ph-pr);
    c.arcTo(px+pw,py+ph,px+pw-pr,py+ph,pr);
    c.lineTo(px+pr,py+ph);
    c.arcTo(px,py+ph,px,py+ph-pr,pr);
    c.lineTo(px,py+pr);
    c.arcTo(px,py,px+pr,py,pr);
    c.closePath();
    c.fill();
    c.fillStyle='#fff';
    c.textAlign='center';
    c.textBaseline='middle';
    c.fillText(label,px+pw/2,y);
    c.restore();
  }
};
Chart.register(refLinePlugin);

function getTipFn(){
  if(curF==='pace')
    return v=>{const m=Math.floor(v),s=Math.round((v-m)*60);return`${m}:${String(s).padStart(2,'0')} /${curU}`};
  return v=>{const h=Math.floor(v),m=Math.floor((v-h)*60),s=Math.round(((v-h)*60-m)*60);return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`};
}

function buildChart(){
  const ctx=document.getElementById('chart').getContext('2d');
  if(chartInst)chartInst.destroy();
  const labels=runs.map(r=>r.name.replace(/(\d{4})/,"'$1").split(' ').slice(0,3).join(' '));
  const data=curF==='pace'
    ? runs.map(r=>curU==='km'?r.paceKm/60:r.paceMi/60)
    : runs.map(r=>r.secs/3600);
  const tipFn=getTipFn();
  chartInst=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      data,
      borderColor:'#F25C1E',
      backgroundColor:c=>{
        const g=c.chart.ctx.createLinearGradient(0,0,0,240);
        g.addColorStop(0,'rgba(242,92,30,.12)');
        g.addColorStop(1,'rgba(242,92,30,0)');
        return g;
      },
      borderWidth:2,
      pointBackgroundColor:'#fff',
      pointBorderColor:'#F25C1E',
      pointBorderWidth:2,
      pointRadius:5,
      pointHoverRadius:7,
      fill:true,
      tension:.3,
    }]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:350},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1A1410',
          titleColor:'rgba(255,255,255,.5)',
          bodyColor:'#fff',
          padding:12,
          cornerRadius:10,
          callbacks:{
            title:c=>runs[c[0].dataIndex].name,
            label:c=>tipFn(c.raw),
            afterLabel:c=>{
              const r=runs[c.dataIndex],d=getDelta(r);
              return`${r.km}km · ${r.date}`+(d?` · ${d.label}`:'');
            }
          }
        }
      },
      onClick(_,els){
        if(!els.length){closePanel();return}
        const idx=els[0].index;
        selIdx===idx?closePanel():showPanel(idx);
      },
      scales:{
        x:{grid:{color:'rgba(26,20,16,.04)'},ticks:{color:'#9A8E87',font:{size:10},maxRotation:40,autoSkip:true}},
        y:{grid:{color:'rgba(26,20,16,.04)'},reverse:curF==='pace',ticks:{color:'#9A8E87',font:{size:10},callback:tipFn}}
      }
    }
  });
  chartInst._tipFn=tipFn;
  updateChartDots();
}

function updateChartDots(){
  if(!chartInst)return;
  const ds=chartInst.data.datasets[0];
  ds.pointBackgroundColor=ds.data.map((_,i)=>i===selIdx?'#F25C1E':'#fff');
  ds.pointRadius=ds.data.map((_,i)=>i===selIdx?8:5);
  ds.pointBorderWidth=ds.data.map((_,i)=>i===selIdx?3:2);
  chartInst.update('none');
}

function showPanel(idx){
  selIdx=idx;
  const r=runs[idx];
  const d=getDelta(r);
  const dHtml=d?`<span class="rp-delta ${d.cls}">${d.label}</span>`:'';
  const panel=document.getElementById('rpanel');
  panel.className='race-panel show';
  panel.innerHTML=`
    <div>
      <div class="rp-name">${r.name}</div>
      <div class="rp-date">${r.date} · ${r.km}km</div>
      <div class="rp-metrics">
        <div class="rp-m"><div class="rp-mv">${ft(r.secs)}</div><div class="rp-ml">Time</div></div>
        <div class="rp-m"><div class="rp-mv">${fp(r.paceKm)}</div><div class="rp-ml">min/km</div></div>
        <div class="rp-m"><div class="rp-mv">${fp(r.paceMi)}</div><div class="rp-ml">min/mi</div></div>
        ${dHtml}
      </div>
    </div>
    <div class="rp-right">
      <button class="rp-close" id="rp-close">✕</button>
      <div class="rp-nav">
        <button class="rp-nb" id="rp-prev" ${idx===0?'disabled':''}>←</button>
        <button class="rp-nb" id="rp-next" ${idx===runs.length-1?'disabled':''}>→</button>
      </div>
    </div>
  `;
  document.getElementById('rp-close').onclick=closePanel;
  document.getElementById('rp-prev').onclick=()=>showPanel(selIdx-1);
  document.getElementById('rp-next').onclick=()=>showPanel(selIdx+1);
  syncActive();
  updateChartDots();
}

function closePanel(){
  selIdx=null;
  document.getElementById('rpanel').className='race-panel';
  syncActive();
  updateChartDots();
}

function syncActive(){
  // table rows are rendered newest-first; chronoIdx maps to row position
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const ci=parseInt(tr.dataset.ci);
    tr.classList.toggle('active',ci===selIdx);
  });
  document.querySelectorAll('.lcard').forEach(c=>{
    const ci=parseInt(c.dataset.ci);
    c.classList.toggle('active',ci===selIdx);
  });
}

// ── SORTABLE TABLE ──
let sortCol='date', sortAsc=false;

function renderTable(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const sorted=[...runs].sort((a,b)=>{
    let va=sortCol==='date'?a.dateObj:a[sortCol];
    let vb=sortCol==='date'?b.dateObj:b[sortCol];
    if(typeof va==='string')va=va.toLowerCase(),vb=vb.toLowerCase();
    if(va<vb)return sortAsc?-1:1;
    if(va>vb)return sortAsc?1:-1;
    return 0;
  });
  // update header arrows
  document.querySelectorAll('#thead th[data-col]').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col===sortCol);
    th.querySelector('.sa').textContent=th.dataset.col===sortCol?(sortAsc?'↑':'↓'):'↕';
  });
  sorted.forEach((r,i)=>{
    const d=getDelta(r);
    const dHtml=d?`<span class="delta ${d.cls}">${d.label}</span>`:`<span class="delta none">—</span>`;
    const isHalf=r.km>15, ci=runs.indexOf(r);
    const tr=document.createElement('tr');
    tr.dataset.ci=ci;
    tr.style.animationDelay=`${i*25}ms`;
    if(ci===selIdx)tr.classList.add('active');
    tr.innerHTML=`
      <td class="ename">${r.name}</td>
      <td class="muted">${r.date}</td>
      <td><span class="dbadge ${isHalf?'dhalf':'d10'}">${isHalf?'21.1km':'10km'}</span></td>
      <td class="mono r">${ft(r.secs)}</td>
      <td class="mono r">${fp(r.paceKm)}</td>
      <td class="mono r">${fp(r.paceMi)}</td>
      <td class="r">${dHtml}</td>
    `;
    tr.onclick=()=>{
      document.getElementById('chart').scrollIntoView({behavior:'smooth',block:'nearest'});
      setTimeout(()=>selIdx===ci?closePanel():showPanel(ci),100);
    };
    tbody.appendChild(tr);
  });
}

document.querySelectorAll('#thead th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    if(sortCol===th.dataset.col){sortAsc=!sortAsc}
    else{sortCol=th.dataset.col;sortAsc=sortCol==='name'||sortCol==='date'}
    renderTable();
  });
});

document.getElementById('logsub').textContent=`${runs.length} races · click column to sort`;
renderTable();

// mobile cards (newest first, fixed)
const lcards=document.getElementById('lcards');
[...runs].sort((a,b)=>b.dateObj-a.dateObj).forEach((r,i)=>{
  const d=getDelta(r);
  const dHtml=d?`<span class="delta ${d.cls}" style="font-size:11px;padding:2px 7px">${d.label}</span>`:'';
  const isHalf=r.km>15, ci=runs.indexOf(r);
  const div=document.createElement('div');
  div.className='lcard';
  div.dataset.ci=ci;
  div.style.animationDelay=`${i*30}ms`;
  div.innerHTML=`
    <div class="lcard-top">
      <div>
        <div class="lcard-name">${r.name}</div>
        <div class="lcard-date">${r.date}</div>
      </div>
      <span class="dbadge ${isHalf?'dhalf':'d10'}">${isHalf?'21.1':'10'}km</span>
    </div>
    <div class="lcard-body">
      <div><div class="lm-l">Time</div><div class="lm-v" style="font-size:12px">${ft(r.secs)}</div></div>
      <div><div class="lm-l">Pace /km</div><div class="lm-v">${fp(r.paceKm)}</div></div>
      <div><div class="lm-l">vs Prev</div><div>${dHtml||'<span style="color:var(--ink3);font-size:12px">—</span>'}</div></div>
    </div>
  `;
  div.onclick=()=>{
    document.getElementById('chart').scrollIntoView({behavior:'smooth',block:'nearest'});
    setTimeout(()=>selIdx===ci?closePanel():showPanel(ci),100);
  };
  lcards.appendChild(div);
});

// chart controls
document.querySelectorAll('.pbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');curF=b.dataset.f;buildChart();
}));
document.querySelectorAll('.ubtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.ubtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');curU=b.dataset.u;buildChart();
}));

buildChart();
</script>
</body>
</html>
